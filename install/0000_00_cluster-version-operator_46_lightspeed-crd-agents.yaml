---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agents.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.llmProvider.name
      name: LLM
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "Agent defines a cluster-scoped agent tier (e.g., \"default\",
          \"smart\", \"fast\").\nThe cluster admin creates Agent resources to configure
          LLM infrastructure\nand runtime settings. Proposals reference agents by
          name per step.\n\nAgent is cluster-scoped. The metadata.name serves as the
          tier identifier.\nThe \"default\" agent must exist; \"smart\" and \"fast\"
          are optional (the\noperator auto-links to \"default\" if absent).\n\nExample
          — a high-capability agent tier:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Agent\n\tmetadata:\n\t  name: smart\n\tspec:\n\t  llmProvider:\n\t    name:
          vertex-opus\n\t  timeouts:\n\t    analysisSeconds: 300\n\t    executionSeconds:
          600\n\t  maxTurns: 200\n\t  providerSettings:\n\t    reasoningEffort: \"high\"\n\nExample
          — a fast, cost-efficient agent tier:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Agent\n\tmetadata:\n\t  name: fast\n\tspec:\n\t  llmProvider:\n\t    name:
          vertex-haiku\n\t  timeouts:\n\t    analysisSeconds: 120\n\t    executionSeconds:
          300\n\t  maxTurns: 100\n\t  providerSettings:\n\t    reasoningEffort: \"low\""
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Agent.
            properties:
              llmProvider:
                description: |-
                  llmProvider references a cluster-scoped LLMProvider CR that supplies the
                  LLM backend for this agent tier.
                properties:
                  name:
                    description: name of the LLMProvider.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              maxTurns:
                description: |-
                  maxTurns is the maximum number of tool-use turns the agent may take
                  in a single step invocation. Prevents runaway loops.
                format: int32
                maximum: 500
                minimum: 1
                type: integer
              providerSettings:
                additionalProperties:
                  type: string
                description: |-
                  providerSettings is a freeform key-value map passed through to the
                  LLM SDK. Use this for provider-specific tuning parameters such as
                  temperature, reasoningEffort, topP, etc. The operator does not
                  validate these keys — they are forwarded as-is to the SDK.
                type: object
              timeouts:
                description: timeouts configures per-step and per-turn timeout limits.
                properties:
                  analysisSeconds:
                    description: analysisSeconds is the timeout for the analysis step
                      in seconds.
                    format: int32
                    maximum: 3600
                    minimum: 1
                    type: integer
                  chatSeconds:
                    description: chatSeconds is the timeout for each chat turn with
                      the LLM in seconds.
                    format: int32
                    maximum: 600
                    minimum: 1
                    type: integer
                  executionSeconds:
                    description: executionSeconds is the timeout for the execution
                      step in seconds.
                    format: int32
                    maximum: 3600
                    minimum: 1
                    type: integer
                  verificationSeconds:
                    description: verificationSeconds is the timeout for the verification
                      step in seconds.
                    format: int32
                    maximum: 3600
                    minimum: 1
                    type: integer
                type: object
            required:
            - llmProvider
            type: object
          status:
            description: status defines the observed state of Agent.
            properties:
              conditions:
                description: |-
                  conditions represent the latest available observations of the
                  Agent's state. The Ready condition summarizes whether all
                  referenced resources (LLMProvider, Secrets) are present.
                  Empty until the operator's first reconcile.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
