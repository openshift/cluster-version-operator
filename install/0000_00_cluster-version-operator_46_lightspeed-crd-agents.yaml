    schema:
      openAPIV3Schema:
        description: "Agent defines a complete agent configuration: which LLM to use,
          what\nskills to mount, optional MCP servers, and what system prompt to follow.\nIt
          is the second link in the CRD chain (LlmProvider -> Agent -> Workflow\n->
          Proposal) and is referenced by Workflow steps via agentRef.\n\nAgent is
          cluster-scoped. You typically create a few agents with different\ncapabilities
          and assign them to workflow steps. For example, an analysis\nagent might
          use a capable model with broad diagnostic skills, while an\nexecution agent
          uses a fast model with targeted remediation skills.\n\nExample — an analysis
          agent with selective skills and a system prompt:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Agent\n\tmetadata:\n\t  name: analyzer\n\tspec:\n\t  llmRef:\n\t    name:
          smart\n\t  skills:\n\t    - image: registry.ci.openshift.org/ocp/5.0:agentic-skills\n\t
          \     paths:\n\t        - /skills/prometheus\n\t        - /skills/cluster-ops\n\t
          \       - /skills/rbac-security\n\t  systemPromptRef:\n\t    name: analysis-prompt\n\nExample
          — an execution agent with a fast model:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Agent\n\tmetadata:\n\t  name: executor\n\tspec:\n\t  llmRef:\n\t    name:
          fast\n\t  skills:\n\t    - image: registry.ci.openshift.org/ocp/5.0:agentic-skills\n\t
          \     paths:\n\t        - /skills/cluster-ops\n\t  systemPromptRef:\n\t
          \   name: execution-prompt\n\nExample — an agent with MCP servers for extended
          tooling:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind: Agent\n\tmetadata:\n\t
          \ name: analyzer-with-mcp\n\tspec:\n\t  llmRef:\n\t    name: smart\n\t  skills:\n\t
          \   - image: registry.ci.openshift.org/ocp/5.0:agentic-skills\n\t  mcpServers:\n\t
          \   - name: openshift\n\t      url: https://mcp.openshift-lightspeed.svc:8443/sse\n\t
          \     timeout: 10\n\t      headers:\n\t        - name: Authorization\n\t
          \         valueFrom:\n\t            type: kubernetes\n\t    - name: pagerduty\n\t
          \     url: https://mcp-pagerduty.example.com/sse\n\t      headers:\n\t        -
          name: X-API-Key\n\t          valueFrom:\n\t            type: secret\n\t
          \           secretRef:\n\t              name: pagerduty-api-key\n\t  systemPromptRef:\n\t
          \   name: analysis-prompt"
