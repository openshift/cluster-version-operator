                    \ - name: violationId\n\t    type: string\n\t    description:
                    \"The ACS violation ID that triggered this proposal\"\n\t    required:
                    true\n\t  - name: affectedImages\n\t    type: array\n\t    description:
                    \"Container images flagged by the violation\"\n\t    items:\n\t
