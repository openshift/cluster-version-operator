                  \ FROM registry.redhat.io/openshift-lightspeed/lightspeed-service-api-rhel9:latest\n
                  \ RUN dnf install -y my-custom-cli\n  COPY my-binary /usr/local/bin/\n\nExample:\n\n\timage:
