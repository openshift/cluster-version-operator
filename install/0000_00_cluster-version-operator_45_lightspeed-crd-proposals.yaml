    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "Proposal represents a unit of work managed by the agentic platform.\nIt
          is the primary resource component teams and adapters interact with.\n\nA
          Proposal defines the workflow shape inline: which steps run and which\nagent
          handles each step. Analysis is always required. Omit execution\nand/or verification
          to skip those steps.\n\nExample — analysis only (advisory):\n\n\tapiVersion:
          agentic.openshift.io/v1alpha1\n\tkind: Proposal\n\tmetadata:\n\t  name:
          one-off-investigation\n\tspec:\n\t  request: \"Investigate why pod foo is
          crashlooping\"\n\t  targetNamespaces:\n\t    - lightspeed-demo\n\t  tools:\n\t
          \   skills:\n\t      - image: registry.redhat.io/acs/acs-lightspeed-skills:latest\n\t
          \ analysis:\n\t    agent: smart\n\nExample — full remediation (analyze →
          execute → verify):\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Proposal\n\tmetadata:\n\t  name: fix-nginx-cve-2024-1234\n\t  namespace:
          stackrox\n\tspec:\n\t  request: \"Fix CVE-2024-1234 in nginx:1.21\"\n\t
          \ targetNamespaces:\n\t    - lightspeed-demo\n\t  tools:\n\t    skills:\n\t
          \     - image: registry.redhat.io/acs/acs-lightspeed-skills:latest\n\t    requiredSecrets:\n\t
          \     - name: acs-api-token\n\t        mountAs:\n\t          type: EnvVar\n\t
          \         envVar:\n\t            name: ACS_API_TOKEN\n\t  analysis:\n\t
          \   agent: smart\n\t  execution: {}\n\t  verification:\n\t    agent: fast"
