        description: "Proposal represents a unit of work managed by the agentic platform.
          It is\nthe final link in the CRD chain (LlmProvider -> Agent -> Workflow
          ->\nProposal) and the primary resource users and adapters interact with.\n\nA
          Proposal references a Workflow that defines which agents handle each\nstep,
          and tracks the full lifecycle from initial request through analysis,\nuser
          approval, execution, and verification. Proposals are created by\nadapters
          (AlertManager webhook, ACS violation webhook, manual creation)\nor by the
          operator itself (escalation child proposals).\n\nProposal is cluster-scoped.
          The operator watches for new Proposals and\ndrives them through the lifecycle
          automatically. Users interact with\nproposals in the Proposed phase to approve,
          deny, or escalate.\n\nExample — a remediation proposal targeting a specific
          namespace:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind: Proposal\n\tmetadata:\n\t
          \ name: fix-crashloop\n\tspec:\n\t  request: |\n\t    Pod web-frontend-5d4b8c6f-x9k2m
          in namespace production is in\n\t    CrashLoopBackOff. Last restart reason:
          OOMKilled. Container memory\n\t    limit is 256Mi.\n\t  workflowRef:\n\t
          \   name: remediation\n\t  targetNamespaces:\n\t    - production\n\nExample
          — advisory-only via workflowOverride (reuses a remediation workflow\nbut
          skips execution so the user applies changes manually):\n\n\tapiVersion:
          agentic.openshift.io/v1alpha1\n\tkind: Proposal\n\tmetadata:\n\t  name:
          one-off-advisory\n\tspec:\n\t  request: \"Review the nginx deployment in
          staging for security best practices\"\n\t  workflowRef:\n\t    name: remediation\n\t
          \ targetNamespaces:\n\t    - staging\n\t  workflowOverride:\n\t    execution:\n\t
          \     skip: true\n\t    verification:\n\t      skip: true\n\nExample — an
          upgrade proposal with limited retries:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Proposal\n\tmetadata:\n\t  name: upgrade-4-22\n\tspec:\n\t  request: \"Analyze
          and plan upgrade from OpenShift 4.21 to 4.22\"\n\t  workflowRef:\n\t    name:
          upgrade\n\t  maxAttempts: 2"
