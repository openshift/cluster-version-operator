apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: update-status-controller-library
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Role that allows the USC binary to operate local resources needed by the o/library-go controller code
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - create
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: update-status-controller-library
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Role that allows the USC binary to operate cluster resources needed by the o/library-go controller code
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
rules:
- apiGroups:
  - config.openshift.io
  resources:
  - infrastructures
  resourceNames:
  - cluster
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: update-status-controller
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Role that allows the update status controller to manage a ConfigMap that serves as UpdateStatus API
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: update-status-controller-control-plane-informer
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Role that allows the update status controller to watch and read control plane resources
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
rules:
- apiGroups:
  - config.openshift.io
  resources:
  - clusterversions
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: update-status-controller-library
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Grant the USC permissions to operate resource needed by the o/library-go controller code
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
subjects:
- kind: ServiceAccount
  name: update-status-controller
  namespace: openshift-cluster-version
roleRef:
  kind: Role
  name: update-status-controller-library
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: update-status-controller-library
  annotations:
    kubernetes.io/description: Grant the USC permissions to operate cluster resources needed by the o/library-go controller code
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: update-status-controller-library
subjects:
- kind: ServiceAccount
  name: update-status-controller
  namespace: openshift-cluster-version
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: update-status-controller-updatestatus-api-manager
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: Grant the update status controller permission to manage the ConfigMap that serves as UpdateStatus API
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
subjects:
- kind: ServiceAccount
  name: update-status-controller
  namespace: openshift-cluster-version
roleRef:
  kind: Role
  name: update-status-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: update-status-controller-control-plane-informer
  annotations:
    kubernetes.io/description: Grant the update status controller permission to read cluster resources (temporary, until we have UpdateInformer producers)
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
subjects:
- kind: ServiceAccount
  name: update-status-controller
  namespace: openshift-cluster-version
roleRef:
  kind: ClusterRole
  name: update-status-controller-control-plane-informer
  apiGroup: rbac.authorization.k8s.io
