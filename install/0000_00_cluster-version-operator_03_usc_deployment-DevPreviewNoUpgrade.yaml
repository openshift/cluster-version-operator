apiVersion: apps/v1
kind: Deployment
metadata:
  name: update-status-controller
  namespace: openshift-cluster-version
  annotations:
    kubernetes.io/description: The update status controller manages OpenShift UpdateStatus API from insights collected from cluster components.
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
spec:
  selector:
    matchLabels:
      k8s-app: update-status-controller
  strategy:
    type: Recreate
  template:
    metadata:
      name: update-status-controller
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
      labels:
        k8s-app: update-status-controller
    spec:
      automountServiceAccountToken: false
      containers:
      - name: update-status-controller
        image: {{.ReleaseImage}}
        imagePullPolicy: IfNotPresent
        args:
        - "update-status-controller"
        - -v=5 # High while in DevPreview, lower for GA
        resources:
          requests:
            cpu: 20m
            memory: 50Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          name: kube-api-access
          readOnly: true
      nodeSelector:
        node-role.kubernetes.io/master: ""
      priorityClassName: "openshift-user-critical"
      serviceAccountName: update-status-controller
      terminationGracePeriodSeconds: 130
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: Exists
        effect: "NoSchedule"
      volumes:
      - name: kube-api-access
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              expirationSeconds: 3600
              path: token
          - configMap:
              items:
              - key: ca.crt
                path: ca.crt
              name: kube-root-ca.crt
          - downwardAPI:
              items:
              - fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
                path: namespace
