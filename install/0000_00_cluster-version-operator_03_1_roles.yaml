apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: featuregate-reader
rules:
- apiGroups: ["config.openshift.io"]
  resources: ["featuregates"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cvo-featuregate-binding
  annotations:
    kubernetes.io/description: Grant the cluster-version operator featuregate specific permissions.
    include.release.openshift.io/self-managed-high-availability: "true"
roleRef:
  kind: ClusterRole
  name: featuregate-reader
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  namespace: openshift-cluster-version
  name: cluster-version-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-version-operator
  annotations:
    kubernetes.io/description: Grant the cluster-version operator permission to perform cluster-admin actions while managing the OpenShift core.
    include.release.openshift.io/self-managed-high-availability: "true"
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  namespace: openshift-cluster-version
  name: cluster-version-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-version-operator-scc-privileged-access
subjects:
- kind: ServiceAccount
  name: update-payload-dedicated-sa
  namespace: openshift-cluster-version
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:privileged
  apiGroup: rbac.authorization.k8s.io
