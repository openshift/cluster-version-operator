      openAPIV3Schema:
        description: "Workflow defines a reusable 3-step pipeline template that controls
          which\nagents handle analysis, execution, and verification, and whether
          any steps\nare skipped. It is the third link in the CRD chain (LlmProvider
          -> Agent ->\nWorkflow -> Proposal) and is referenced by Proposal resources
          via\nspec.workflowRef.\n\nWorkflow is cluster-scoped. You create workflows
          representing different\noperational patterns and then reference them from
          proposals. Per-proposal\noverrides (WorkflowOverride in the Proposal spec)
          allow customizing\nindividual steps without creating a new Workflow.\n\nExample
          — full remediation (analyze, execute, verify):\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          Workflow\n\tmetadata:\n\t  name: remediation\n\tspec:\n\t  analysis:\n\t
          \   agentRef:\n\t      name: analyzer\n\t  execution:\n\t    agentRef:\n\t
          \     name: executor\n\t  verification:\n\t    agentRef:\n\t      name:
          verifier\n\nExample — advisory-only (analyze only, no execution or verification):\n\n\tapiVersion:
          agentic.openshift.io/v1alpha1\n\tkind: Workflow\n\tmetadata:\n\t  name:
          advisory-only\n\tspec:\n\t  analysis:\n\t    agentRef:\n\t      name: analyzer\n\t
          \ execution:\n\t    skip: true\n\t  verification:\n\t    skip: true\n\nExample
          — gitops-remediation (analyze, skip execution, verify after user applies
          via git):\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind: Workflow\n\tmetadata:\n\t
          \ name: gitops-remediation\n\tspec:\n\t  analysis:\n\t    agentRef:\n\t
